<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>❄️ EG Hydrant Rescue</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #07090f;
  --panel:     #0e1420;
  --border:    #1c2535;
  --accent:    #3b82f6;
  --red:       #f43f5e;
  --green:     #10b981;
  --gray:      #475569;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --header-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100dvh;
}

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--header-h);
  background: rgba(7,9,15,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 10px;
}

#header-logo { font-size: 1.4rem; flex-shrink: 0; }

#header-title {
  flex: 1; min-width: 0;
}
#header-title h1 {
  font-size: 0.88rem; font-weight: 800; letter-spacing: -0.01em; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#header-title p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--muted); letter-spacing: 0.04em;
}

#stats-bar {
  display: flex; gap: 6px; flex-shrink: 0;
}
.stat {
  display: flex; align-items: center; gap: 4px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ─── MAP ─── */
#map {
  position: fixed;
  top: var(--header-h);
  bottom: 0; left: 0; right: 0;
}

/* ─── LOADING ─── */
#loading {
  position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 900;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.snowflake-spin {
  font-size: 2.5rem;
  animation: snow-spin 2s linear infinite;
}
@keyframes snow-spin { to { transform: rotate(360deg); } }
#loading-msg { color: var(--muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; }

/* ─── BANNER (hosting warning / demo mode) ─── */
#banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: linear-gradient(90deg, #7c2d12, #9a3412);
  border-top: 1px solid #c2410c;
  padding: 8px 14px;
  font-size: 0.75rem; line-height: 1.5;
  display: none;
}
#banner strong { color: #fed7aa; }
#banner a { color: #fb923c; }
#banner-close {
  float: right; background: none; border: none; color: #fdba74; font-size: 1rem;
  cursor: pointer; padding: 0 0 0 8px; line-height: 1;
}

/* ─── LIVE PULSE ─── */
#live-dot {
  position: fixed; top: calc(var(--header-h) + 10px); right: 10px; z-index: 800;
  display: flex; align-items: center; gap: 5px;
  background: rgba(14,20,32,0.85); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 9px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #34d399;
}
.pulse { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }

/* ─── LEGEND ─── */
#legend {
  position: fixed; bottom: 12px; left: 10px; z-index: 800;
  background: rgba(14,20,32,0.9); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
  font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; line-height: 2;
}
#legend .leg-title { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
.leg { display: flex; align-items: center; gap: 7px; }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* ─── TOAST ─── */
#toast {
  position: fixed; top: calc(var(--header-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 14px;
  font-size: 0.78rem; z-index: 2000; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── POPUP ─── */
.leaflet-popup-content-wrapper {
  background: var(--panel) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-tip { background: var(--panel) !important; }
.leaflet-popup-close-button { color: var(--muted) !important; top: 8px !important; right: 8px !important; font-size: 18px !important; }

.popup-wrap { padding: 16px 16px 12px; min-width: 210px; }
.popup-id {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  color: var(--muted); margin-bottom: 2px; letter-spacing: 0.04em;
}
.popup-street { font-size: 0.92rem; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
.popup-status-lbl {
  font-size: 0.72rem; text-align: center;
  border-radius: 6px; padding: 5px 8px; margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(255,255,255,0.05);
}
.popup-divider { border: none; border-top: 1px solid var(--border); margin: 0 -16px 10px; }

.btn-row { display: flex; flex-direction: column; gap: 5px; }
.popup-btn {
  width: 100%; padding: 9px 12px; border: none; border-radius: 7px;
  font-size: 0.8rem; font-weight: 700; font-family: 'Syne', sans-serif;
  cursor: pointer; transition: transform 0.1s, filter 0.1s;
  letter-spacing: 0.02em;
}
.popup-btn:active { transform: scale(0.97); }
.btn-clear  { background: rgba(16,185,129,0.18); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
.btn-needs  { background: rgba(244,63,94,0.18);  color: #fda4af; border: 1px solid rgba(244,63,94,0.3); }
.btn-reset  { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 0.72rem; padding: 6px; }

/* ─── CUSTOM MARKERS ─── */
.h-marker {
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.2);
  transition: transform 0.2s;
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-logo">❄️🚒</div>
  <div id="header-title">
    <h1>East Greenwich Hydrant Rescue</h1>
    <p>TAP HYDRANT → UPDATE STATUS</p>
  </div>
  <div id="stats-bar">
    <div class="stat"><span class="stat-dot" style="background:var(--red)"></span><span id="cnt-needs">–</span></div>
    <div class="stat"><span class="stat-dot" style="background:var(--green)"></span><span id="cnt-clear">–</span></div>
    <div class="stat"><span class="stat-dot" style="background:var(--gray)"></span><span id="cnt-unk">–</span></div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LOADING -->
<div id="loading">
  <div class="snowflake-spin">❄️</div>
  <div id="loading-msg">Fetching hydrant locations…</div>
</div>

<!-- LIVE INDICATOR -->
<div id="live-dot" style="display:none"><div class="pulse"></div> LIVE SYNC</div>

<!-- LEGEND -->
<div id="legend" style="display:none">
  <div class="leg-title">Tap any hydrant</div>
  <div class="leg"><span class="leg-dot" style="background:var(--gray)"></span>Status unknown</div>
  <div class="leg"><span class="leg-dot" style="background:var(--red)"></span>Needs digging out</div>
  <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>Cleared &amp; ready</div>
</div>

<!-- BANNER (demo mode / hosting warning) -->
<div id="banner">
  <button id="banner-close" onclick="document.getElementById('banner').style.display='none'">✕</button>
  <span id="banner-text"></span>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const CENTER   = [41.657, -71.524];
const ZOOM     = 14;
const POLL_MS  = 12000;
const STORE_KEY = 'eg-hydrant-v3';

// East Greenwich bounding box for Overpass
const EG_BBOX = '41.615,-71.585,41.710,-71.455';

// OpenStreetMap Overpass API — open CORS headers, works from any hosted origin
const OVERPASS_URL =
  `https://overpass-api.de/api/interpreter?data=` +
  encodeURIComponent(`[out:json][timeout:30];node["emergency"="fire_hydrant"](${EG_BBOX});out;`);

// ═══════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════
const map = L.map('map', { zoomControl: false, tap: true }).setView(CENTER, ZOOM);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OSM © CARTO | Hydrant data: OSM contributors & RIGIS',
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let markers  = {};   // id → L.circleMarker
let hydrants = {};   // id → {lat, lon, tags}
let statuses = {};   // id → 'unknown'|'needs'|'clear'
let demoMode = false;

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function setLoading(msg) {
  const el = document.getElementById('loading');
  if (msg) { el.style.display = 'flex'; document.getElementById('loading-msg').textContent = msg; }
  else { el.style.display = 'none'; }
}

function showBanner(html) {
  const b = document.getElementById('banner');
  document.getElementById('banner-text').innerHTML = html;
  b.style.display = 'block';
}

function colorOf(s) {
  return s === 'clear' ? '#10b981' : s === 'needs' ? '#f43f5e' : '#475569';
}

function labelOf(s) {
  return s === 'clear' ? '✅ CLEARED — ready for fire use'
       : s === 'needs' ? '⚠️ NEEDS DIGGING OUT'
       : '❓ Status unknown — tap to update';
}

function updateStats() {
  const ids = Object.keys(hydrants);
  const c = ids.filter(i => statuses[i] === 'clear').length;
  const n = ids.filter(i => statuses[i] === 'needs').length;
  const u = ids.filter(i => !statuses[i] || statuses[i] === 'unknown').length;
  document.getElementById('cnt-clear').textContent = c;
  document.getElementById('cnt-needs').textContent = n;
  document.getElementById('cnt-unk').textContent   = u;
}

// ═══════════════════════════════════════════════
//  STORAGE (shared, real-time across all users)
// ═══════════════════════════════════════════════
async function saveAll() {
  try { await window.storage.set(STORE_KEY, JSON.stringify(statuses), true); }
  catch(e) {}
}

async function loadAll() {
  try {
    const r = await window.storage.get(STORE_KEY, true);
    if (r?.value) Object.assign(statuses, JSON.parse(r.value));
  } catch(e) {}
}

async function syncRemote() {
  try {
    const r = await window.storage.get(STORE_KEY, true);
    if (!r?.value) return;
    const remote = JSON.parse(r.value);
    let changed = 0;
    for (const [id, st] of Object.entries(remote)) {
      if (statuses[id] !== st) { applyStatus(id, st, false); changed++; }
    }
    if (changed) { updateStats(); toast(`🔄 ${changed} hydrant(s) updated by another volunteer`); }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  MARKERS
// ═══════════════════════════════════════════════
function buildMarker(id, lat, lon, label) {
  hydrants[id] = { lat, lon, label };
  const st    = statuses[id] || 'unknown';
  const color = colorOf(st);

  const m = L.circleMarker([lat, lon], {
    radius: 7, color, fillColor: color, fillOpacity: 0.85, weight: 2.5
  }).addTo(map);

  markers[id] = m;

  m.bindPopup(makePopup(id, label), { maxWidth: 250 });
  return m;
}

function makePopup(id, label) {
  return () => {
    const div = document.createElement('div');
    div.className = 'popup-wrap';
    div.innerHTML = `
      <div class="popup-id">HYDRANT ${demoMode ? '⚠️ DEMO' : '#' + id}</div>
      <div class="popup-street">${label}</div>
      <div class="popup-status-lbl" id="slbl-${id}">${labelOf(statuses[id] || 'unknown')}</div>
      <hr class="popup-divider">
      <div class="btn-row">
        <button class="popup-btn btn-clear" onclick="window.setStatus('${id}','clear')">✅ Mark CLEARED</button>
        <button class="popup-btn btn-needs" onclick="window.setStatus('${id}','needs')">⚠️ Mark NEEDS DIGGING</button>
        <button class="popup-btn btn-reset" onclick="window.setStatus('${id}','unknown')">↩ Reset to Unknown</button>
      </div>
    `;
    return div;
  };
}

function applyStatus(id, st, animate = false) {
  statuses[id] = st;
  const m = markers[id];
  if (!m) return;
  const c = colorOf(st);
  m.setStyle({ color: c, fillColor: c });
  if (animate) { m.setRadius(11); setTimeout(() => m.setRadius(7), 250); }
  const lbl = document.getElementById('slbl-' + id);
  if (lbl) lbl.textContent = labelOf(st);
}

window.setStatus = async (id, st) => {
  applyStatus(id, st, true);
  updateStats();
  await saveAll();
  map.closePopup();
  const msgs = { clear:'✅ Marked cleared!', needs:'⚠️ Marked: needs digging', unknown:'↩ Status reset' };
  toast(msgs[st]);
};

// ═══════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════
function showMap() {
  setLoading(false);
  document.getElementById('live-dot').style.display = 'flex';
  document.getElementById('legend').style.display   = 'block';
  updateStats();
  setInterval(syncRemote, POLL_MS);
}

async function loadOverpass() {
  setLoading('Fetching hydrants from OpenStreetMap…');
  const res  = await fetch(OVERPASS_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const nodes = (data.elements || []).filter(e => e.type === 'node');
  if (nodes.length === 0) throw new Error('No OSM hydrants found in bounding box');
  return nodes;
}

async function tryLoadRIGIS() {
  // Try RIGIS ArcGIS Feature Service as secondary source
  // Service name confirmed from RIGIS item 03613fa8...
  const urls = [
    'https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/e911Hydrants22r1/FeatureServer/0/query?geometry=-71.585%2C41.615%2C-71.455%2C41.710&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&outFields=OBJECTID%2CSTREET_NAM%2CSTREET_NUM&returnGeometry=true&f=geojson',
    'https://services2.arcgis.com/S8zZg9pg23JUEexQ/arcgis/rest/services/E911Hydrants/FeatureServer/0/query?geometry=-71.585%2C41.615%2C-71.455%2C41.710&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&outFields=*&returnGeometry=true&f=geojson',
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.error) continue;
      if (!data.features || data.features.length === 0) continue;
      return data.features;
    } catch(e) { continue; }
  }
  throw new Error('RIGIS not reachable');
}

function renderOSMNodes(nodes) {
  nodes.forEach(node => {
    const id  = String(node.id);
    const t   = node.tags || {};
    const street = [t['addr:housenumber'], t['addr:street'] || t.name || 'Fire Hydrant'].filter(Boolean).join(' ');
    buildMarker(id, node.lat, node.lon, street);
  });
  toast(`Loaded ${nodes.length} hydrants from OpenStreetMap`);
}

function renderRIGIS(features) {
  features.forEach(f => {
    const p  = f.properties;
    const id = String(p.OBJECTID || p.FID);
    const [lon, lat] = f.geometry.coordinates;
    const street = [p.STREET_NUM, p.STREET_NAM].filter(Boolean).join(' ') || 'Fire Hydrant';
    buildMarker(id, lat, lon, street);
  });
  toast(`Loaded ${features.length} hydrants from RIGIS`);
}

function renderDemo() {
  demoMode = true;
  // ~35 plausible East Greenwich hydrant locations (approximate streets)
  const pts = [
    [41.6597,-71.5283,'Main St & Division'],[41.6605,-71.5270,'Main St'],[41.6614,-71.5253,'Main St & London'],
    [41.6578,-71.5246,'Division St'],[41.6590,-71.5230,'Division St'],[41.6568,-71.5214,'King St'],
    [41.6557,-71.5229,'King St'],[41.6543,-71.5243,'King St & Academy'],
    [41.6620,-71.5178,'London St'],[41.6634,-71.5162,'London St'],[41.6647,-71.5141,'London St'],
    [41.6529,-71.5280,'Academy Ave'],[41.6515,-71.5260,'Academy Ave'],[41.6501,-71.5300,'Academy Ave'],
    [41.6661,-71.5200,'Frenchtown Rd'],[41.6675,-71.5225,'Frenchtown Rd'],[41.6688,-71.5251,'Frenchtown Rd'],
    [41.6499,-71.5315,'Forge Rd'],[41.6510,-71.5341,'Forge Rd'],[41.6521,-71.5362,'Forge Rd'],
    [41.6697,-71.5272,'Middle Rd'],[41.6712,-71.5292,'Middle Rd'],[41.6480,-71.5275,'Middle Rd'],
    [41.6464,-71.5250,'Peirce St'],[41.6690,-71.5131,'First Ave'],[41.6701,-71.5101,'First Ave'],
    [41.6720,-71.5182,'Brown St'],[41.6455,-71.5230,'First Ave'],[41.6442,-71.5261,'Second Ave'],
    [41.6535,-71.5187,'Weybosset St'],[41.6548,-71.5171,'Weybosset St'],[41.6560,-71.5155,'Weybosset St'],
    [41.6572,-71.5140,'Division & Weybosset'],[41.6583,-71.5125,'Harbor View Dr'],[41.6596,-71.5110,'Harbor View Dr'],
  ];
  pts.forEach(([lat, lon, label], i) => buildMarker(`DEMO-${i}`, lat, lon, label));
  toast(`Demo mode: ${pts.length} approximate hydrant locations`);
  showBanner(
    `<strong>⚠️ DEMO DATA — approximate hydrant positions only.</strong><br>` +
    `This app can't load real data when opened as a local file on iOS. ` +
    `Host it free on <a href="https://app.netlify.com/drop" target="_blank">Netlify Drop</a> in 30 seconds for live data + real sharing.`
  );
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
(async () => {
  await loadAll();

  let loaded = false;

  // 1. Try OpenStreetMap Overpass (best CORS support)
  try {
    const nodes = await loadOverpass();
    renderOSMNodes(nodes);
    loaded = true;
    // If very few OSM hydrants found, note that RIGIS has more
    if (nodes.length < 20) {
      showBanner(
        `Only ${nodes.length} hydrant(s) mapped in OpenStreetMap for East Greenwich. ` +
        `The town's RIGIS dataset has more. See the <a href="https://www.rigis.org" target="_blank">RIGIS site</a> to export and embed the full dataset.`
      );
    }
  } catch (e1) {
    // 2. Try RIGIS ArcGIS feature service
    try {
      setLoading('Trying RIGIS GIS database…');
      const features = await tryLoadRIGIS();
      renderRIGIS(features);
      loaded = true;
    } catch (e2) {
      // 3. Fall back to demo data
      renderDemo();
      loaded = true;
    }
  }

  if (loaded) showMap();
})();
</script>
</body>
</html>
